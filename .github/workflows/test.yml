name: Cognito Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Tests on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        # On Windows runners the default shell is PowerShell, but hooks and
        # tests assume Bash. Git Bash ships pre-installed on windows-latest.
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Expose `python3` alias on Windows
        if: runner.os == 'Windows'
        run: |
          python_exe=$(python -c "import sys; print(sys.executable)")
          python_dir=$(dirname "$python_exe")
          # GitHub Actions path injection for subsequent steps.
          echo "$python_dir" >> "$GITHUB_PATH"
          # Some distributions do not provide a `python3` shim on Windows.
          if [ ! -f "$python_dir/python3.exe" ]; then
            cp "$python_exe" "$python_dir/python3.exe"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Install jq (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y jq

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq

      - name: Install jq (Windows)
        if: runner.os == 'Windows'
        run: choco install jq -y --no-progress

      - name: Make hooks executable
        if: runner.os != 'Windows'
        run: chmod +x hooks/*.sh tests/run_tests.sh

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

      - name: Shellcheck hooks
        if: runner.os == 'Linux'
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./hooks
          severity: warning

      - name: Install bats-core
        if: runner.os == 'Linux'
        run: sudo apt-get install -y bats

      - name: Install bats-core (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core

      - name: Run bats tests
        # bats-core does not support Windows natively (requires WSL).
        # Tracked in ROADMAP.md v1.2 → "Windows in CI".
        if: runner.os != 'Windows'
        run: bats tests/bats/hooks.bats

  syntax-check:
    name: Syntax validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate JSON files
        run: |
          for f in config/*.json; do
            echo "Validating $f"
            python -c "import json; json.load(open('$f'))"
          done

      - name: Validate YAML profiles
        run: |
          pip install pyyaml
          for f in profiles/*.yaml; do
            echo "Validating $f"
            python -c "import yaml; yaml.safe_load(open('$f'))"
          done

      - name: Bash syntax check
        run: |
          for f in hooks/*.sh; do
            echo "Checking $f"
            bash -n "$f"
          done
