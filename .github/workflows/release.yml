name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate semver
        run: |
          tag="${{ steps.tag.outputs.value }}"
          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "::error::Tag '$tag' is not valid semver (vMAJOR.MINOR.PATCH[-pre])"
            exit 1
          fi

      - name: Extract changelog section
        id: changelog
        run: |
          tag="${{ steps.tag.outputs.value }}"
          version="${tag#v}"
          awk -v ver="$version" '
            BEGIN { p = 0 }
            /^## \[/ {
              if (p) exit
              if ($0 ~ "\\[" ver "\\]") { p = 1; next }
            }
            p { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog entry found for $version — falling back to autogenerated notes." > release-notes.md
          fi
          {
            echo 'notes<<EOF'
            cat release-notes.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build source archive
        run: |
          tag="${{ steps.tag.outputs.value }}"
          git archive --format=tar.gz --prefix="cognito-${tag#v}/" -o "cognito-${tag#v}.tar.gz" "$tag"
          git archive --format=zip   --prefix="cognito-${tag#v}/" -o "cognito-${tag#v}.zip"    "$tag"
          sha256sum cognito-${tag#v}.tar.gz cognito-${tag#v}.zip > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Cognito ${{ steps.tag.outputs.value }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.value, '-') }}
          files: |
            cognito-*.tar.gz
            cognito-*.zip
            SHA256SUMS.txt
